<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results - HomeDokan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{min-width:320px}
    img{max-width:100%;height:auto;display:block}
    .product-card{transition:transform .2s,box-shadow .2s}
    .product-card:hover{transform:translateY(-4px);box-shadow:0 1rem 2rem rgba(0,0,0,.12)!important}
    .ratio img{width:100%;height:100%;object-fit:cover}
    @media(max-width:991.98px){.navbar .collapse.navbar-collapse{display:none!important}.bg-dark .col-12.col-lg-5{display:none!important}}
    @media(max-width:575.98px){footer .col-md-4,footer .col-md-3,footer .col-md-2{width:100%!important;flex:0 0 100%!important;max-width:100%!important}.btn{white-space:normal}}
  </style>
</head>
<body>
  <div class="bg-dark text-white py-2">
    <div class="container">
      <div class="row g-2 text-center text-lg-start align-items-center">
        <div class="col-12 col-lg-2">&#9742; +880 1717-761-261</div>
        <div class="col-12 col-lg-3">&#9993; info@homedokan.com</div>
        <div class="col-12 col-lg-5">
          <div class="input-group">
            <input id="searchResultsInput" type="search" class="form-control" placeholder="Search products...">
          </div>
        </div>
        <div class="col-12 col-lg-2 d-none d-lg-block text-end">My Account | INR</div>
      </div>
    </div>
  </div>

  <div id="global-navbar"></div>

  <header class="bg-success text-white py-5">
    <div class="container text-center">
      <h1 id="searchResultsTitle" class="display-4 fw-bold">Search Products</h1>
      <p id="searchResultsSummary" class="lead mb-0">Type a product name and press Enter.</p>
    </div>
  </header>

  <main class="container py-5">
    <div id="searchResultsGrid" class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4"></div>
  </main>

  <div id="global-footer"></div>

  <script>
    function injectLayout(elementId, filePath) {
      fetch(filePath)
        .then(response => {
          if (!response.ok) throw new Error('Failed to load ' + filePath);
          return response.text();
        })
        .then(data => {
          document.getElementById(elementId).innerHTML = data;
          if (elementId === 'global-navbar' && typeof renderCart === 'function') renderCart();
        })
        .catch(error => console.error(error));
    }

    injectLayout('global-navbar', 'navbar.html');
    injectLayout('global-footer', 'footer.html');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="products.js"></script>
  <script src="card-generator.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
</body>
</html>
