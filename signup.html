<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - HomeDokan</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{min-width:320px}
    img{max-width:100%;height:auto;display:block}
    @media(max-width:991.98px){
      .navbar .collapse.navbar-collapse{display:none!important}
      .col-lg-5.text-center.text-lg-start{display:none}
    }
    @media(max-width:575.98px){
      footer .col-md-4,footer .col-md-3,footer .col-md-2{width:100%!important;flex:0 0 100%!important;max-width:100%!important}
      .btn{white-space:normal}
    }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <!-- TOP BLACK BAR -->

    <div class="bg-dark text-white py-2">
    <div class="container">

        <div class="row g-2 text-center text-lg-start align-items-center">

            <div class="col-12 col-lg-2">
                &#9742; +880 1717-761-261
            </div>

            <div class="col-12 col-lg-3">
                &#9993; info@homedokan.com
            </div>
            <div class='col-12 col-lg-5 d-none d-lg-block'></div>

            <div class="col-12 col-lg-2 d-none d-lg-block text-end">
                My Account | INR
            </div>

        </div>

    </div>
</div>
<div id="global-navbar"></div>

  <main class="container py-5">
    <div class="row justify-content-center align-items-center g-4">
      <div class="col-lg-5 text-center text-lg-start">
        <p class="text-success fw-bold mb-2">JOIN HOMEDOKAN</p>
        <h1 class="fw-bold display-5">Create your grocery account.</h1>
        <p class="lead text-secondary">Save your details once, then login before checkout whenever you shop.</p>
      </div>

      <div class="col-lg-5">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h2 class="h3 fw-bold mb-4">Sign Up</h2>
            <div id="signupMessage" class="alert d-none"></div>

            <form id="signupForm">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="signupName" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="signupEmail" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" id="signupPhone" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="signupPassword" class="form-control" minlength="4" required>
              </div>
              <button class="btn btn-success w-100 rounded-pill" type="submit">Create Account</button>
            </form>

            <p class="text-center mt-4 mb-0">Already have an account? <a href="login.html" class="text-success fw-bold">Login</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="global-footer"></div>

  <script>
    function injectLayout(elementId, filePath) {
      fetch(filePath).then(response => response.text()).then(data => {
        document.getElementById(elementId).innerHTML = data;
        if (typeof renderCart === 'function') renderCart();
        if (typeof updateNavbarAccount === 'function') updateNavbarAccount();
      });
    }
    injectLayout('global-navbar', 'navbar.html');
    injectLayout('global-footer', 'footer.html');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function (event) {
      event.preventDefault();

      let name = document.getElementById('signupName').value.trim();
      let email = document.getElementById('signupEmail').value.trim().toLowerCase();
      let phone = document.getElementById('signupPhone').value.trim();
      let cleanPhone = phone.replace(/\D/g, '');
      let password = document.getElementById('signupPassword').value;
      let users = getUsers();
      let message = document.getElementById('signupMessage');

      for (let i = 0; i < users.length; i++) {
        let savedPhone = users[i].phone.replace(/\D/g, '');

        if (users[i].email.toLowerCase() === email || savedPhone === cleanPhone) {
          message.className = 'alert alert-danger';
          message.textContent = 'An account already exists with this email or phone.';
          return;
        }
      }

      users.push({
        name: name,
        email: email,
        phone: phone,
        password: password,
        createdAt: new Date().toISOString()
      });

      saveUsers(users);
      localStorage.removeItem('homedokan-current-user');
      message.className = 'alert alert-success';
      message.textContent = 'Account created. Please login now.';

      setTimeout(function () {
        window.location.href = 'login.html';
      }, 1200);
    });
  </script>
</body>
</html>
